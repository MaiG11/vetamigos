<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="https://www.thymeleaf.org/">
<head>
    <title>Lista de Animais</title>
</head>
<body>
    <h1>Cadastro de Animais</h1>
    <a href="/principal">Voltar</a>

    <form method="get" action="/animais">
        <input type="text" name="buscaAnimal" placeholder="Buscar animal..."/>
        <button type="submit">Buscar</button>
    </form>

    <table border="1">
        <tr>
            <th>Nome</th>
            <th>Espécie</th>
            <th>Qtd. Consultas</th>
            <th>Mínimo</th>
            <th>Ações</th>
        </tr>
        <tr th:each="animal : ${animais}">
            <td th:text="${animal.nome}"></td>
            <td th:text="${animal.especie}"></td>
            <td th:text="${animal.quantidadeConsultas}"></td>
            <td th:text="${animal.quantidadeMinima}"></td>
            <td>
                <a th:href="@{/animais/editar/{id}(id=${animal.id})}">Editar</a>
                <form th:action="@{/animais/deletar/{id}(id=${animal.id})}" method="post" style="display:inline;">
                    <button type="submit" onclick="return confirm('Deseja excluir?');">Excluir</button>
                </form>
            </td>
        </tr>
    </table>
    <br/>
    <a href="/animais/novo">Novo Animal</a>
</body>
</html>
