<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Animais - Vet Amigos</title>
</head>
<body>

    <h1>Gerenciar Animais</h1>

    <!--Navegação (Botão Voltar) -->
    <a href="/principal">
        <button type="button">Voltar para a Tela Principal</button>
    </a>
    <hr>

    <!--Campo de Busca -->
    <h3>Buscar Animal por Nome</h3>
    <form method="get" action="/animais">
        <input type="text" name="buscaAnimal" placeholder="Digite o nome do animal...">
        <button type="submit">Buscar</button>
        <a href="/animais">
            <button type="button">Limpar Busca</button>
        </a>
    </form>
    <hr>

    <!--Listagem Automática em Tabela -->
    <h3>Lista de Animais</h3>
    <table border="1" cellpadding="5" cellspacing="0">
        <thead>
            <tr>
                <th>Nome</th>
                <th>Espécie</th>
                <th>Raça</th>
                <th>Peso</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="animal : ${animais}">
                <td th:text="${animal.nome}">Nome</td>
                <td th:text="${animal.especie}">Espécie</td>
                <td th:text="${animal.raca}">Raça</td>
                <td th:text="${animal.peso}">Peso</td>
            </tr>
        </tbody>
    </table>
    <hr>

    <!--Formulário de Inserção -->
    <h3>Cadastrar Novo Animal</h3>
    <form method="post" action="/animais/salvar">
        <label>Nome:</label>
        <input type="text" name="nome" required><br><br>

        <label>Espécie:</label>
        <input type="text" name="especie" required><br><br>

        <label>Raça:</label>
        <input type="text" name="raca" required><br><br>

        <label>Peso (kg):</label>
        <input type="text" name="peso" required><br><br>

        <button type="submit">Salvar Animal</button>
    </form>

</body>
</html>
