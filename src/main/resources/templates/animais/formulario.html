<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="https://www.thymeleaf.org/">
<head>
    <title>Formulário de Animal</title>
</head>
<body>
    <h1 th:text="${animal.id} == null ? 'Novo Animal' : 'Editar Animal'"></h1>
    <a href="/animais">Voltar</a>

    <form method="post" action="/animais/salvar" th:object="${animal}">
        <input type="hidden" th:field="*{id}" />
        <label>Nome:</label> 
        <input type="text" th:field="*{nome}" required/><br/>

        <label>Espécie:</label> 
        <input type="text" th:field="*{especie}"/><br/>

        <label>Raça:</label> 
        <input type="text" th:field="*{raca}"/><br/>

        <label>Sexo:</label> 
        <input type="text" th:field="*{sexo}"/><br/>

        <label>Data de Nascimento:</label> 
        <input type="date" th:field="*{dataDeNascimento}"/><br/>

        <label>Peso:</label> 
        <input type="number" step="0.01" th:field="*{peso}"/><br/>

        <label>Qtd. Consultas:</label> 
        <input type="number" th:field="*{quantidadeConsultas}" required/><br/>

        <label>Qtd. Mínima:</label> 
        <input type="number" th:field="*{quantidadeMinima}" required/><br/>
        
        <button type="submit">Salvar</button>
    </form>
</body>
</html>
