<!doctype html>
<html lang="pt-br" xmlns:th="https://www.thymeleaf.org/">
  <head>
    <title>Editar Animal - Vetamigos</title>
  </head>
  <body>
    <h1>Editar Animal</h1>
    <a href="/animais">Voltar a página inicial</a>

    <form method="post" action="/animais/salvar" th:object="${animal}">
      <!-- eu preciso desse cara: PORQUE o id é obrigatório para o save() atualizar -->
      <input type="hidden" th:field="*{id}" />

      <label>Nome</label>
      <input type="text" th:field="*{nome}" /><br />

      <label>Descrição</label>
      <input type="text" th:field="*{descricao}" /><br />

      <label>Quantidade</label>
      <input type="number" th:field="*{quantidade}" /><br />

      <label>Estoque Mínimo</label>
      <input type="number" th:field="*{estoqueMinimo}" /><br />

      <label>Categoria</label>
      <input type="text" th:field="*{categoria}" /><br />

      <button type="submit">Atualizar o Animal</button>
    </form>
  </body>
</html>
